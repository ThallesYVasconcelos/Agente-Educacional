version: "3.9"

services:
  streamlit:
    build: .
    command: streamlit
    ports:
      - "8501:8501"
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./eval/results:/app/eval/results
    depends_on:
      - mcp
    restart: unless-stopped

  mcp:
    build: .
    command: mcp
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    restart: unless-stopped

volumes:
  chroma_data:
